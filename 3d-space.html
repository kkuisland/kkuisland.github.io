<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 추모 공간 - 초코의 영원한 집</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 1.2rem;
        }

        #loading.hidden {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .nav-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .nav-bar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .ui-overlay {
            position: fixed;
            top: 100px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        #tooltip.visible {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .ui-overlay {
                max-width: 250px;
                padding: 15px;
                font-size: 0.9rem;
            }
            .nav-bar {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-spinner"></div>
        <div>사랑하는 초코의 집을 준비하고 있습니다...</div>
    </div>

    <nav class="nav-bar">
        <a href="index.html">🏠 홈</a>
        <a href="memorial.html">📖 추모 페이지</a>
        <a href="upload.html">📸 업로드</a>
        <a href="guestbook.html">💌 방명록</a>
    </nav>

    <div class="ui-overlay">
        <h3 style="margin-bottom: 10px;">🏠 초코의 영원한 집</h3>
        <p style="margin: 5px 0;"><strong>말티즈 초코</strong></p>
        <p style="margin: 5px 0; font-size: 0.9rem;">2010.03.15 - 2024.11.20</p>
        <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">
        <p style="font-size: 0.9rem; line-height: 1.6; color: #666;">
            물건들을 클릭하면 추억을 볼 수 있어요. 
            마우스로 시점을 돌리고 스크롤로 확대/축소할 수 있습니다.
        </p>
    </div>

    <div class="controls">
        🖱️ 드래그: 시점 회전 | 휠: 확대/축소 | 클릭: 상호작용
    </div>

    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let objects = [];
        let raycaster, mouse;
        let isMouseDown = false;
        let previousMousePosition = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const floorGeometry = new THREE.PlaneGeometry(20, 20);
            const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            createHouse();
            createPetItems();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            setupEventListeners();

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);

            animate();
        }

        function createHouse() {
            const wallGeometry = new THREE.BoxGeometry(8, 4, 0.2);
            const wallMaterial = new THREE.MeshLambertMaterial({ color: 0xFFF8DC });
            const wall = new THREE.Mesh(wallGeometry, wallMaterial);
            wall.position.set(0, 2, -4);
            wall.castShadow = true;
            scene.add(wall);

            const roofGeometry = new THREE.ConeGeometry(5, 2, 4);
            const roofMaterial = new THREE.MeshLambertMaterial({ color: 0xD2691E });
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.set(0, 5, -4);
            roof.rotation.y = Math.PI / 4;
            scene.add(roof);
        }

        function createPetItems() {
            // 사료그릇
            const bowlGeometry = new THREE.CylinderGeometry(0.5, 0.4, 0.3, 16);
            const bowlMaterial = new THREE.MeshLambertMaterial({ color: 0xFF69B4 });
            const bowl = new THREE.Mesh(bowlGeometry, bowlMaterial);
            bowl.position.set(-2, 0.15, 1);
            bowl.castShadow = true;
            bowl.userData = {
                name: '핑크 사료그릇',
                description: '매일 저녁 6시가 되면 이 그릇 앞에서\n꼬리를 흔들며 기다리던 초코.\n지금도 그 모습이 눈에 선해요.'
            };
            scene.add(bowl);
            objects.push(bowl);

            // 장난감 공
            const ballGeometry = new THREE.SphereGeometry(0.3, 16, 16);
            const ballMaterial = new THREE.MeshLambertMaterial({ color: 0xFFFF00 });
            const ball = new THREE.Mesh(ballGeometry, ballMaterial);
            ball.position.set(2, 0.3, 2);
            ball.castShadow = true;
            ball.userData = {
                name: '노란 테니스공',
                description: '공원에서 이 공을 던지면\n신나게 달려가서 물고 오던 초코.\n그때의 행복한 표정이 그리워요.'
            };
            scene.add(ball);
            objects.push(ball);

            // 방석
            const cushionGeometry = new THREE.BoxGeometry(1.5, 0.2, 1.5);
            const cushionMaterial = new THREE.MeshLambertMaterial({ color: 0x9370DB });
            const cushion = new THREE.Mesh(cushionGeometry, cushionMaterial);
            cushion.position.set(0, 0.1, -1);
            cushion.castShadow = true;
            cushion.userData = {
                name: '보라색 방석',
                description: '햇살 좋은 날이면\n이 방석에서 낮잠 자는 걸 제일 좋아했던 초코.\n평화로운 잠든 모습이 그립습니다.'
            };
            scene.add(cushion);
            objects.push(cushion);

            // 목줄
            const collarGeometry = new THREE.TorusGeometry(0.25, 0.05, 8, 16);
            const collarMaterial = new THREE.MeshLambertMaterial({ color: 0xFF0000 });
            const collar = new THREE.Mesh(collarGeometry, collarMaterial);
            collar.position.set(-3, 1.2, -3);
            collar.castShadow = true;
            collar.userData = {
                name: '빨간 목줄',
                description: '산책 나갈 때마다 이 목줄만 보면\n신나서 뛰어다녔던 초코.\n산책은 우리 둘만의 특별한 시간이었어요.'
            };
            scene.add(collar);
            objects.push(collar);
        }

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onMouseWheel);
            renderer.domElement.addEventListener('click', onMouseClick);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (isMouseDown) {
                const deltaMove = {
                    x: event.offsetX - previousMousePosition.x,
                    y: event.offsetY - previousMousePosition.y
                };

                const deltaRotationQuaternion = new THREE.Quaternion()
                    .setFromEuler(new THREE.Euler(
                        deltaMove.y * 0.01,
                        deltaMove.x * 0.01,
                        0,
                        'XYZ'
                    ));

                camera.quaternion.multiplyQuaternions(deltaRotationQuaternion, camera.quaternion);
            }

            previousMousePosition = {
                x: event.offsetX,
                y: event.offsetY
            };

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            const tooltip = document.getElementById('tooltip');
            if (intersects.length > 0) {
                const object = intersects[0].object;
                tooltip.textContent = object.userData.name;
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                tooltip.classList.add('visible');
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.classList.remove('visible');
                document.body.style.cursor = 'default';
            }
        }

        function onMouseDown(event) {
            isMouseDown = true;
        }

        function onMouseUp(event) {
            isMouseDown = false;
        }

        function onMouseWheel(event) {
            event.preventDefault();
            camera.position.z += event.deltaY * 0.01;
            camera.position.z = Math.max(2, Math.min(15, camera.position.z));
        }

        function onMouseClick(event) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                alert(object.userData.name + '\n\n' + object.userData.description);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            objects.forEach((obj, index) => {
                obj.rotation.y += 0.005;
                obj.position.y += Math.sin(Date.now() * 0.001 + index) * 0.002;
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
