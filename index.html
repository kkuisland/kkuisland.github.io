<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무지개다리 추모 공간 - 사랑하는 반려견을 위한 영원한 집</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            max-width: 1200px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: gentle-float 3s ease-in-out infinite;
        }

        @keyframes gentle-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .hero-image {
            width: 100%;
            max-width: 600px;
            height: 400px;
            margin: 40px auto;
            border-radius: 20px;
            background: url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=800&auto=format&fit=crop') center/cover;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fade-in 1s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            text-decoration: none;
            color: #4a5568;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .nav-card .icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .nav-card h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #667eea;
        }

        .nav-card p {
            font-size: 1rem;
            line-height: 1.6;
            color: #718096;
        }

        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .subtitle { font-size: 1.2rem; }
            .nav-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌈</div>
        <h1>무지개다리 추모 공간</h1>
        <p class="subtitle">사랑하는 반려견을 위한 영원한 디지털 집</p>

        <div class="hero-image"></div>

        <div class="nav-grid">
            <a href="memorial.html" class="nav-card">
                <div class="icon">📖</div>
                <h2>추모 페이지</h2>
                <p>사진과 추억, 메시지가 담긴<br>아름다운 추모 공간을 둘러보세요</p>
            </a>

            <a href="3d-space.html" class="nav-card">
                <div class="icon">🏠</div>
                <h2>3D 추모 공간</h2>
                <p>반려견이 사용하던 물건들이<br>있는 입체적인 집으로 입장하세요</p>
            </a>

            <a href="upload.html" class="nav-card">
                <div class="icon">📸</div>
                <h2>추억 업로드</h2>
                <p>새로운 사진과 물건을<br>추모 공간에 추가해보세요</p>
            </a>

            <a href="guestbook.html" class="nav-card">
                <div class="icon">💌</div>
                <h2>방명록</h2>
                <p>따뜻한 위로의 메시지를<br>남기고 확인해보세요</p>
            </a>
        </div>

        <div class="footer">
            <p>💕 사랑은 영원합니다 💕</p>
            <p style="margin-top: 10px; font-size: 0.8rem;">
                © 2024 Rainbow Bridge Memorial. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        // 페이지 로드 애니메이션
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.nav-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(30px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.6s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 200 * index);
            });
        });
    </script>
</body>
</html>
